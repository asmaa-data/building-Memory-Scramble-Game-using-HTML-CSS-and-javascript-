<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Memory Game</title>

    <link rel="stylesheet" href="game.css" />
  </head>

  <body>
    <h1>Memory Scramble Game</h1>

    <!-- SETTINGS -->

    <div class="settings">
      <input type="number" id="rows" placeholder="Rows" value="4" />

      <input type="number" id="cols" placeholder="Columns" value="4" />

      <input type="number" id="time" placeholder="Time" value="60" />

      <button id="startBtn">Start Game</button>
    </div>

    <!-- TIMER -->

    <h2 id="timer">Time Left: 60</h2>

    <!-- GAME BOARD -->

    <div class="game-board" id="gameBoard"></div>

    <script src="game.js"></script>
  </body>
</html>
